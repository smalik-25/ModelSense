# Lookup tasks (12): answer a single deterministic fact about the model. Expected
# values are pulled from reference.json by dotted `ref`, never hand-typed.

- id: lookup-helmet-triangles
  category: lookup
  difficulty: easy
  prompt: How many triangles does this model have?
  model_id: DamagedHelmet
  judge: true
  expected_tools:
    - name: load_model
      args: { model_id: DamagedHelmet }
  assertions:
    - kind: tool_output
      tool: load_model
      path: totals.triangles
      ref: DamagedHelmet.totals.triangles
    - kind: answer_contains_number
      ref: DamagedHelmet.totals.triangles

