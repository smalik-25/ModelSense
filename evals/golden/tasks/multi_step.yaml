- id: multi-truck-heaviest-mesh-highlight
  category: multi_step
  difficulty: hard
  prompt: Which mesh has the most triangles? Highlight it and tell me the count.
  model_id: CesiumMilkTruck
  judge: true
  budgets: { max_steps: 8 }
  expected_tools:
    - name: load_model
    - name: find_elements
    - name: highlight_elements
  assertions:
    - kind: highlight_includes
      node_ref: CesiumMilkTruck.largestNode.id
    - kind: answer_contains_number
      ref: CesiumMilkTruck.largestNode.triangles

- id: multi-truck-highlight-color
  category: multi_step
  difficulty: medium
  prompt: Highlight the wheels in green.
  model_id: CesiumMilkTruck
  budgets: { max_steps: 8 }
  expected_tools:
    - name: load_model
    - name: find_elements
      args: { query: { regex: "(?i)wheel" } }
    - name: highlight_elements
      args: { color: { regex: "^#" } }
  assertions:
    - kind: scene_command
      command_type: highlight

- id: multi-truck-count-and-focus
  category: multi_step
  difficulty: medium
  prompt: How many wheels does the truck have, and focus the camera on one of them.
  model_id: CesiumMilkTruck
  judge: true
  budgets: { max_steps: 8 }
  expected_tools:
    - name: load_model
    - name: find_elements
      args: { query: { regex: "(?i)wheel" } }
    - name: camera_focus
  assertions:
    - kind: scene_command
      command_type: camera_focus
    - kind: answer_contains_number
      value: 2

- id: multi-helmet-highlight-and-count
  category: multi_step
  difficulty: hard
  prompt: Highlight the helmet and tell me its triangle count.
  model_id: DamagedHelmet
  judge: true
  budgets: { max_steps: 8 }
  expected_tools:
    - name: load_model
    - name: find_elements
    - name: highlight_elements
  assertions:
    - kind: scene_command
      command_type: highlight
    - kind: answer_contains_number
      ref: DamagedHelmet.totals.triangles

- id: multi-truck-compare-wheels
  category: multi_step
  difficulty: hard
  prompt: Are the two wheels the same size? Highlight both to show me.
  model_id: CesiumMilkTruck
  judge: true
  budgets: { max_steps: 8 }
  expected_tools:
    - name: load_model
    - name: find_elements
      args: { query: { regex: "(?i)wheel" } }
    - name: highlight_elements
  assertions:
    - kind: highlight_includes
      node: Wheels
    - kind: highlight_includes
      node: Wheels.001
    - kind: answer_matches
      value: "same|equal|identical|tied|both.*768"

- id: multi-helmet-complexity-rundown
  category: multi_step
  difficulty: medium
  prompt: Give me a rundown of this model's geometry complexity.
  model_id: DamagedHelmet
  judge: true
  budgets: { max_steps: 8 }
  expected_tools:
    - name: load_model
    - name: get_scene_stats
  assertions:
    - kind: tool_called
      value: get_scene_stats
    - kind: answer_contains_number
      ref: DamagedHelmet.totals.triangles
