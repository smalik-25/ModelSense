# Multi-step tasks (14): the agent chains inspection + a scene action. Outcomes
# are checked on the emitted scene commands (highlight / camera_focus), which the
# agent forwards verbatim from tool structuredContent.

- id: multi-truck-wheels-highlight-largest
  category: multi_step
  difficulty: medium
  prompt: Find every node with "wheel" in the name and highlight the largest one.
  model_id: CesiumMilkTruck
  budgets: { max_steps: 8 }
  expected_tools:
    - name: load_model
      args: { model_id: CesiumMilkTruck }
    - name: find_elements
      args: { query: { regex: "(?i)wheel" } }
    - name: highlight_elements
  assertions:
    - kind: scene_command
      command_type: highlight

- id: multi-truck-highlight-largest-object
  category: multi_step
  difficulty: medium
  prompt: Highlight the single largest object in this scene.
  model_id: CesiumMilkTruck
  budgets: { max_steps: 8 }
  expected_tools:
    - name: load_model
    - name: find_elements
    - name: highlight_elements
  assertions:
    - kind: scene_command
      command_type: highlight
    - kind: highlight_includes
      node_ref: CesiumMilkTruck.largestNode.id

- id: multi-helmet-highlight
