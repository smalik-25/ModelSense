# Render blueprint for the ModelSense backend (MCP server; agent /chat added in Phase 2).
# Free tier: spins down after 15 min idle, ~30-60s cold start. One public port per
# service, so the combined server+agent process mounts all routes on $PORT.
# Secrets are injected via the dashboard (sync: false), never committed.
services:
  - type: web
    name: modelsense
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: corepack enable && corepack prepare pnpm@10.15.0 --activate && pnpm install --frozen-lockfile && pnpm --filter @modelsense/agent... run build
    startCommand: pnpm --filter @modelsense/agent start
    healthCheckPath: /healthz
    buildFilter:
      paths:
        - apps/server/**
        - apps/agent/**
        - packages/shared/**
        - pnpm-lock.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_BASE_URL
        sync: false
      - key: MCP_API_KEY
        sync: false
      # Optional: the Vercel web origin for CORS (defaults to * if unset).
      - key: WEB_ORIGIN
        sync: false
      # Optional: enables the clickable Langfuse trace deep link in the UI.
      - key: LANGFUSE_PROJECT_ID
        sync: false
      # Optional: set to "true" only if the Langfuse project shares traces
      # publicly, so the visitor-facing deep link does not hit a login wall.
      - key: LANGFUSE_TRACES_PUBLIC
        sync: false
